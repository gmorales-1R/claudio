<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claudio — Vault</title>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #222;
      --border: #2a2a2a; --accent: #7fffd4; --text: #e0e0e0;
      --muted: #888; --error: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 1.5rem; max-width: 480px; margin: 0 auto; }
    h1 { color: var(--accent); font-size: 1.1rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; }
    h2 { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .field { margin-bottom: 0.9rem; }
    .field label { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.85rem;
      padding: 0.4rem 0.6rem; border-radius: 2px; outline: none;
    }
    .field input:focus { border-color: var(--accent); }
    .btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.3rem 0.75rem; font-family: inherit; font-size: 0.8rem;
      cursor: pointer; border-radius: 2px; margin-right: 0.5rem;
    }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.danger:hover { border-color: var(--error); color: var(--error); }
    .msg { font-size: 0.8rem; margin-top: 0.75rem; padding: 0.4rem 0.6rem; border-radius: 2px; border: 1px solid var(--border); }
    .msg.ok { border-color: var(--accent); color: var(--accent); }
    .msg.err { border-color: var(--error); color: var(--error); }
    .key-list { list-style: none; }
    .key-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.6rem; border: 1px solid var(--border);
      background: var(--surface2); border-radius: 2px; margin-bottom: 0.4rem;
      font-size: 0.85rem;
    }
    .key-name { color: var(--accent); }
    .key-value { color: var(--muted); font-size: 0.75rem; flex: 1; margin: 0 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-right: 0.5rem; }
    #unlock-section { display: block; }
    #vault-section { display: none; }
  </style>
</head>
<body>

<h1><span class="status-dot"></span>Claudio — Vault</h1>

<!-- Unlock -->
<div id="unlock-section">
  <div class="card">
    <h2>Unlock</h2>
    <div class="field">
      <label>Passphrase</label>
      <input id="passphrase" type="password" placeholder="Enter passphrase..." onkeydown="if(event.key==='Enter') unlock()"/>
    </div>
    <button class="btn primary" onclick="unlock()">unlock</button>
    <div id="unlock-msg"></div>
  </div>
</div>

<!-- Vault -->
<div id="vault-section">
  <div class="card">
    <h2>Store Secret</h2>
    <div class="field">
      <label>Key</label>
      <input id="s-key" type="text" placeholder="e.g. supabase_anon_key"/>
    </div>
    <div class="field">
      <label>Value</label>
      <input id="s-value" type="text" placeholder="secret value"/>
    </div>
    <button class="btn primary" onclick="storeSecret()">encrypt + store</button>
    <div id="store-msg"></div>
  </div>

  <div class="card">
    <h2>Secrets</h2>
    <ul class="key-list" id="key-list"><li style="color:var(--muted);font-size:0.82rem">No secrets yet.</li></ul>
  </div>

  <div class="card">
    <h2>Export Keyring</h2>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem">Copy this JSON and commit it to vault/keyring.json</p>
    <textarea id="export-box" readonly style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:0.75rem;padding:0.5rem;border-radius:2px;min-height:80px;outline:none;resize:vertical"></textarea>
    <button class="btn primary" style="margin-top:0.5rem" onclick="copyExport()">copy</button>
    <div id="export-msg"></div>
  </div>

  <button class="btn danger" style="margin-top:0.5rem" onclick="lockVault()">lock vault</button>
</div>

<script>
  let masterKey = null;
  let secrets = {};  // { key: { iv, ciphertext } }

  // ── Crypto helpers ─────────────────────────────────────
  async function deriveKey(passphrase, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  function toB64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
  function fromB64(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

  async function encryptValue(value) {
    const enc = new TextEncoder();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, masterKey, enc.encode(value));
    return { iv: toB64(iv), ciphertext: toB64(ciphertext) };
  }

  async function decryptValue(entry) {
    const dec = new TextDecoder();
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: fromB64(entry.iv) },
      masterKey,
      fromB64(entry.ciphertext)
    );
    return dec.decode(plain);
  }

  // ── Unlock ─────────────────────────────────────────────
  async function unlock() {
    const passphrase = document.getElementById('passphrase').value;
    if (!passphrase) return;
    try {
      // Load keyring
      const res = await fetch('/vault/keyring.json');
      const keyring = await res.json();

      // Derive key using fixed salt (salt is not secret — stored in keyring meta)
      const saltB64 = keyring.__salt || toB64(crypto.getRandomValues(new Uint8Array(16)));
      masterKey = await deriveKey(passphrase, fromB64(saltB64));

      // Try to decrypt each entry to validate passphrase
      secrets = {};
      for (const [k, v] of Object.entries(keyring)) {
        if (k.startsWith('__')) continue;
        try {
          const plain = await decryptValue(v);
          secrets[k] = { ...v, plain };
        } catch {
          msg('unlock-msg', 'Wrong passphrase or corrupted entry.', true);
          masterKey = null;
          return;
        }
      }

      // Store salt for new entries
      secrets.__salt = saltB64;

      document.getElementById('unlock-section').style.display = 'none';
      document.getElementById('vault-section').style.display = 'block';
      renderSecrets();
      updateExport();
      msg('store-msg', '');
    } catch(e) {
      msg('unlock-msg', 'Failed to load keyring: ' + e.message, true);
    }
  }

  // ── Store ──────────────────────────────────────────────
  async function storeSecret() {
    const key = document.getElementById('s-key').value.trim();
    const value = document.getElementById('s-value').value.trim();
    if (!key || !value) { msg('store-msg', 'Key and value required.', true); return; }
    if (key.startsWith('__')) { msg('store-msg', 'Reserved key name.', true); return; }
    try {
      const encrypted = await encryptValue(value);
      secrets[key] = { ...encrypted, plain: value };
      document.getElementById('s-key').value = '';
      document.getElementById('s-value').value = '';
      renderSecrets();
      updateExport();
      msg('store-msg', `"${key}" stored.`, false);
    } catch(e) {
      msg('store-msg', 'Encrypt failed: ' + e.message, true);
    }
  }

  // ── Render ─────────────────────────────────────────────
  function renderSecrets() {
    const ul = document.getElementById('key-list');
    const entries = Object.entries(secrets).filter(([k]) => !k.startsWith('__'));
    if (!entries.length) { ul.innerHTML = '<li style="color:var(--muted);font-size:0.82rem">No secrets yet.</li>'; return; }
    ul.innerHTML = entries.map(([k, v]) => `
      <li class="key-item">
        <span class="key-name">${k}</span>
        <span class="key-value" id="val-${k}">••••••••</span>
        <button class="btn" onclick="toggleReveal('${k}')">reveal</button>
        <button class="btn danger" onclick="deleteSecret('${k}')">x</button>
      </li>`).join('');
  }

  function toggleReveal(key) {
    const el = document.getElementById('val-' + key);
    el.textContent = el.textContent === '••••••••' ? secrets[key].plain : '••••••••';
  }

  function deleteSecret(key) {
    delete secrets[key];
    renderSecrets();
    updateExport();
  }

  // ── Export ─────────────────────────────────────────────
  function updateExport() {
    const keyring = { __salt: secrets.__salt };
    for (const [k, v] of Object.entries(secrets)) {
      if (k.startsWith('__')) continue;
      keyring[k] = { iv: v.iv, ciphertext: v.ciphertext };
    }
    document.getElementById('export-box').value = JSON.stringify(keyring, null, 2);
  }

  function copyExport() {
    const box = document.getElementById('export-box');
    navigator.clipboard.writeText(box.value).then(() => msg('export-msg', 'Copied!', false)).catch(() => {
      box.select(); document.execCommand('copy');
      msg('export-msg', 'Copied!', false);
    });
  }

  function lockVault() {
    masterKey = null; secrets = {};
    document.getElementById('vault-section').style.display = 'none';
    document.getElementById('unlock-section').style.display = 'block';
    document.getElementById('passphrase').value = '';
  }

  function msg(id, text, isErr = false) {
    const el = document.getElementById(id);
    if (!text) { el.innerHTML = ''; return; }
    el.className = 'msg ' + (isErr ? 'err' : 'ok');
    el.textContent = text;
  }
</script>
</body>
</html>
