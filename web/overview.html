<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claudio — Overview</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --accent: #7fffd4;
      --text: #e0e0e0;
      --muted: #888;
      --error: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 1.5rem; }
    h1 { color: var(--accent); font-size: 1.2rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; }
    h2 { font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
    section { margin-bottom: 2.5rem; }

    /* Tasks */
    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 0.4rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .task-item:hover { border-color: var(--accent); }
    .task-item.done { opacity: 0.4; }
    .task-item.done .task-title { text-decoration: line-through; }
    .task-priority { font-size: 0.7rem; color: var(--muted); width: 50px; flex-shrink: 0; }
    .task-priority.high { color: var(--error); }
    .task-priority.medium { color: #f0c040; }
    .task-title { flex: 1; font-size: 0.9rem; }
    .task-due { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
    .task-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.2rem 0.5rem; font-family: inherit; font-size: 0.75rem;
      cursor: pointer; border-radius: 2px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.danger:hover { border-color: var(--error); color: var(--error); }

    /* Add task form */
    .add-form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .add-form input, .add-form select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.85rem;
      padding: 0.4rem 0.6rem; border-radius: 2px; outline: none;
    }
    .add-form input:focus, .add-form select:focus { border-color: var(--accent); }
    .add-form input[name=title] { flex: 1; min-width: 150px; }

    /* Calendar */
    .cal-list { list-style: none; }
    .cal-item {
      display: flex; gap: 1rem; align-items: baseline;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 0.4rem;
      border-radius: 3px;
    }
    .cal-date { color: var(--accent); font-size: 0.8rem; white-space: nowrap; }
    .cal-title { flex: 1; font-size: 0.9rem; }
    .cal-notes { font-size: 0.75rem; color: var(--muted); }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-right: 0.5rem; }
    .empty { color: var(--muted); font-size: 0.85rem; padding: 0.5rem 0; }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 4px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.25rem;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem;
    }
    .modal-header h3 { font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.85rem;
      padding: 0.4rem 0.6rem; border-radius: 2px; outline: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; }

    /* Comments */
    .comments { margin-top: 1.25rem; }
    .comments h4 { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
    .comment-list { list-style: none; margin-bottom: 0.75rem; }
    .comment-item {
      padding: 0.5rem 0.6rem;
      border-left: 2px solid var(--border);
      margin-bottom: 0.5rem;
      font-size: 0.82rem;
    }
    .comment-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.2rem; }
    .comment-add { display: flex; gap: 0.5rem; }
    .comment-add input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.82rem;
      padding: 0.4rem 0.6rem; border-radius: 2px; outline: none;
    }
    .comment-add input:focus { border-color: var(--accent); }

    .modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/eruda/3.0.1/eruda.min.js"></script>
  <script>eruda.init();</script>
</head>
<body>

<h1><span class="status-dot"></span>Claudio — Overview</h1>

<section id="tasks-section">
  <h2>Tasks</h2>
  <ul class="task-list" id="task-list"></ul>
  <div class="add-form">
    <input name="title" placeholder="New task..." />
    <select name="priority">
      <option value="medium">medium</option>
      <option value="high">high</option>
      <option value="low">low</option>
    </select>
    <input name="due" type="date" />
    <button class="btn primary" onclick="addTask()">+ add</button>
  </div>
</section>

<section id="calendar-section">
  <h2>Upcoming</h2>
  <ul class="cal-list" id="cal-list"></ul>
</section>

<!-- Task Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3>Task Detail</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field">
      <label>Title</label>
      <input id="m-title" type="text" />
    </div>
    <div class="field">
      <label>Status</label>
      <select id="m-status">
        <option value="todo">todo</option>
        <option value="in-progress">in-progress</option>
        <option value="done">done</option>
      </select>
    </div>
    <div class="field">
      <label>Priority</label>
      <select id="m-priority">
        <option value="high">high</option>
        <option value="medium">medium</option>
        <option value="low">low</option>
      </select>
    </div>
    <div class="field">
      <label>Due Date</label>
      <input id="m-due" type="date" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="m-notes"></textarea>
    </div>

    <div class="comments">
      <h4>Follow-ups &amp; Comments</h4>
      <ul class="comment-list" id="m-comments"></ul>
      <div class="comment-add">
        <input id="m-comment-input" placeholder="Add a follow-up..." onkeydown="if(event.key==='Enter') addComment()" />
        <button class="btn primary" onclick="addComment()">+ add</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn danger" onclick="deleteFromModal()">delete</button>
      <button class="btn" onclick="closeModal()">cancel</button>
      <button class="btn primary" onclick="saveModal()">save</button>
    </div>
  </div>
</div>

<script>
  let tasks = [];
  let events = [];
  let nextId = 1;
  let activeTaskId = null;

  // ── Load ───────────────────────────────────────────────
  async function loadTasks() {
    try {
      const res = await fetch('/tasks/tasks.md');
      const text = await res.text();
      const lines = text.split('\n').filter(l => l.startsWith('|') && !l.startsWith('| ID') && !l.startsWith('|-'));
      tasks = lines.map(line => {
        const cols = line.split('|').map(c => c.trim()).filter(Boolean);
        return {
          id: parseInt(cols[0]),
          title: cols[1],
          status: cols[2],
          priority: cols[3],
          due: cols[4] || '',
          notes: cols[5] || '',
          comments: []
        };
      }).filter(t => t.id);
      nextId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
    } catch(e) { tasks = []; }
    renderTasks();
  }

  async function loadCalendar() {
    try {
      const res = await fetch('/tasks/calendar.csv');
      const text = await res.text();
      const lines = text.trim().split('\n').slice(1);
      events = lines.map(line => {
        const [id, title, date, time, notes] = line.split(',');
        return { id, title, date, time, notes };
      });
    } catch(e) { events = []; }
    renderCalendar();
  }

  // ── Render ─────────────────────────────────────────────
  function renderTasks() {
    const ul = document.getElementById('task-list');
    if (!tasks.length) { ul.innerHTML = '<li class="empty">No tasks.</li>'; return; }
    ul.innerHTML = tasks.map(t => `
      <li class="task-item ${t.status === 'done' ? 'done' : ''}" onclick="openModal(${t.id})">
        <span class="task-priority ${t.priority}">${t.priority}</span>
        <span class="task-title">${t.title}</span>
        <span class="task-due">${t.due || ''}</span>
        <div class="task-actions">
          <button class="btn danger" onclick="event.stopPropagation(); deleteTask(${t.id})">x</button>
        </div>
      </li>`).join('');
  }

  function renderCalendar() {
    const ul = document.getElementById('cal-list');
    const today = new Date().toISOString().split('T')[0];
    const upcoming = events.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));
    if (!upcoming.length) { ul.innerHTML = '<li class="empty">No upcoming events.</li>'; return; }
    ul.innerHTML = upcoming.map(e => `
      <li class="cal-item">
        <span class="cal-date">${e.date} ${e.time}</span>
        <span class="cal-title">${e.title}</span>
        <span class="cal-notes">${e.notes || ''}</span>
      </li>`).join('');
  }

  // ── Modal ──────────────────────────────────────────────
  function openModal(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    activeTaskId = id;
    document.getElementById('m-title').value = t.title;
    document.getElementById('m-status').value = t.status;
    document.getElementById('m-priority').value = t.priority;
    document.getElementById('m-due').value = t.due || '';
    document.getElementById('m-notes').value = t.notes || '';
    renderComments(t.comments || []);
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    activeTaskId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function renderComments(comments) {
    const ul = document.getElementById('m-comments');
    if (!comments.length) { ul.innerHTML = '<li class="empty" style="font-size:0.8rem">No follow-ups yet.</li>'; return; }
    ul.innerHTML = comments.map(c => `
      <li class="comment-item">
        <div class="comment-meta">${c.date}</div>
        <div>${c.text}</div>
      </li>`).join('');
  }

  function addComment() {
    const input = document.getElementById('m-comment-input');
    const text = input.value.trim();
    if (!text || !activeTaskId) return;
    const t = tasks.find(t => t.id === activeTaskId);
    if (!t) return;
    if (!t.comments) t.comments = [];
    t.comments.push({ text, date: new Date().toISOString().split('T')[0] });
    renderComments(t.comments);
    input.value = '';
  }

  function saveModal() {
    const t = tasks.find(t => t.id === activeTaskId);
    if (!t) return;
    t.title    = document.getElementById('m-title').value.trim() || t.title;
    t.status   = document.getElementById('m-status').value;
    t.priority = document.getElementById('m-priority').value;
    t.due      = document.getElementById('m-due').value;
    t.notes    = document.getElementById('m-notes').value;
    closeModal();
    renderTasks();
    saveTasks();
  }

  function deleteFromModal() {
    deleteTask(activeTaskId);
    closeModal();
  }

  // ── CRUD ───────────────────────────────────────────────
  function addTask() {
    const title = document.querySelector('input[name=title]').value.trim();
    const priority = document.querySelector('select[name=priority]').value;
    const due = document.querySelector('input[name=due]').value;
    if (!title) return;
    tasks.push({ id: nextId++, title, status: 'todo', priority, due, notes: '', comments: [] });
    document.querySelector('input[name=title]').value = '';
    renderTasks();
    saveTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
    saveTasks();
  }

  function saveTasks() {
    console.log('Tasks state:', JSON.stringify(tasks, null, 2));
  }

  loadTasks();
  loadCalendar();
</script>
</body>
</html>
