<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claudio Workbench</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #7fffd4;
      margin-bottom: 0.5rem;
    }
    p {
      color: #888;
      font-size: 1rem;
    }
    .status {
      margin-top: 2rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid #7fffd4;
      border-radius: 4px;
      color: #7fffd4;
      font-size: 0.85rem;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Claudio</h1>
    <p>Personal AI Workbench</p>
    <div class="status">⬤ online</div>
  </div>
</body>
</html>
